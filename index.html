<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Story Points</title>
		<meta name="description" content="Realtime pointing poker for agile teams" />
		<!-- Social previews. Static defaults; the Worker rewrites these per
		     request for "/" and "/room/*" (room name in the title, room or
		     seasonal theme image) — see worker/index.ts. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Story Points" />
		<meta property="og:title" content="Story Points" />
		<meta property="og:description" content="Estimate together, in realtime." />
		<meta property="og:url" content="https://story-points.danielrose7.workers.dev/" />
		<meta property="og:image" content="https://story-points.danielrose7.workers.dev/og/classic.png?v=1" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:image" content="https://story-points.danielrose7.workers.dev/og/classic.png?v=1" />
		<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🃏</text></svg>" />
		<!-- SoftwareApplication schema: the structured facts AI assistants
		     parse when recommending tools in this category. -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "SoftwareApplication",
				"name": "Story Points",
				"applicationCategory": "BusinessApplication",
				"applicationSubCategory": "Planning poker / agile estimation",
				"operatingSystem": "Web",
				"url": "https://story-points.danielrose7.workers.dev/",
				"description": "Realtime pointing poker for agile teams. No accounts — one standing URL per room, hidden votes with auto-reveal, round history, 29 themes, and a plain-HTTP API plus llms.txt for AI-agent workflows.",
				"offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
				"featureList": "hidden votes, auto-reveal, voting countdown, ticket queue with CSV import, round history export, anonymous voting, seasonal themes, agent-ready HTTP API",
				"softwareHelp": "https://story-points.danielrose7.workers.dev/docs/",
				"license": "https://github.com/danielrose7/story-points/blob/main/LICENSE",
				"author": { "@type": "Person", "name": "Dan Rose", "url": "https://gobloom.io" },
				"copyrightHolder": { "@type": "Organization", "name": "Bloom Interactive LLC", "url": "https://gobloom.io" }
			}
		</script>
		<!-- Deliberately render-blocking (no defer/module): stamps the theme
		     before first paint to avoid a Flash of inAccurate coloR Theme.
		     Rooms use their cached theme; everything else gets the seasonal
		     theme for today's date. Anchors mirror seasonalTheme() in
		     shared/types.ts — keep in sync. -->
		<script>
			(function () {
				try {
					var m = location.pathname.match(/^\/room\/([a-z0-9-]{1,64})$/);
					var t = m && localStorage.getItem('sp:theme:' + m[1]);
					if (!t) {
						// third slot = locale-scoped anchor (regional celebration)
						var anchors = [
							['nye', 1], ['newyear', 32], ['valentines', 45], ['carnaval', 48, 'pt'],
							['stpatricks', 76], ['hanami', 91, 'ja'], ['easter', 95],
							['feria', 105, 'es'], ['mothersday', 130], ['summer', 172],
							['festajunina', 175, 'pt'], ['july4', 185, 'en'],
							['tanabata', 188, 'ja'], ['sanfermin', 188, 'es'],
							['obon', 225, 'ja'], ['bastille', 195, 'fr'],
							['backtoschool', 237], ['oktoberfest', 263, 'de'],
							['fall', 265], ['halloween', 304], ['muertos', 305, 'es'],
							['beaujolais', 323, 'fr'],
							['thanksgiving', 330, 'en'], ['christmas', 359],
						];
						var supported = ['en', 'es', 'de', 'fr', 'pt', 'ja'];
						var loc = localStorage.getItem('sp:locale');
						if (!loc || supported.indexOf(loc) < 0) {
							loc = (navigator.language || 'en').toLowerCase().split('-')[0];
							if (supported.indexOf(loc) < 0) loc = 'en';
						}
						var now = new Date();
						var doy = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 864e5);
						var bd = 999;
						for (var i = 0; i < anchors.length; i++) {
							if (anchors[i][2] && anchors[i][2] !== loc) continue;
							var raw = Math.abs(anchors[i][1] - doy);
							var d = Math.min(raw, 365 - raw);
							if (d < bd) { bd = d; t = anchors[i][0]; }
						}
					}
					document.documentElement.dataset.theme = t;
				} catch (e) {}
			})();
		</script>
		<link rel="stylesheet" href="/src/styles.css" />
		<script type="module" src="/src/main.ts"></script>
	</head>
	<body>
		<points-app></points-app>
	</body>
</html>
